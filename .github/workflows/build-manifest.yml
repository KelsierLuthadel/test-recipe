name: Rebuild recipes.json

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - 'scripts/build-manifest.mjs'
      - '.github/workflows/build-manifest.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-manifest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build manifest
        run: node scripts/build-manifest.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain docs/recipes.json)" ]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add docs/recipes.json
            git commit -m "chore: rebuild recipes.json [skip ci]"
            git push
          else
            echo "recipes.json is already up to date"
          fi
